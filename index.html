<!DOCTYPE html>
<html>
<head>
    <title>내 앱</title>
    <link rel="manifest" href="manifest.json">
</head>
<body>

<h2>단어 자동 Anki 생성기</h2>

<input type="text" id="word" placeholder="단어 입력"
onkeydown="if(event.key==='Enter') searchWord()">

<button onclick="searchWord()">검색</button>
    
<p id="result">결과가 여기에 표시됩니다</p>

<button onclick="copyText()">복사</button>

<script>
async function searchWord() {
    let word = document.getElementById("word").value;

    // 입력 없을 때 방지
    if (!word) {
        alert("단어를 입력해줘!");
        return;
    }

    document.getElementById("result").innerText = "검색 중...";

    try {
        let res = await fetch(`https://jisho.org/api/v1/search/words?keyword=${word}`);
        let data = await res.json();

        if (data.data.length === 0) {
            document.getElementById("result").innerText = "단어를 찾을 수 없음";
            return;
        }

        let result = data.data[0];

        let reading = result.japanese[0].reading;
        let meaning = result.senses[0].english_definitions.join(", ");

        document.getElementById("result").innerText =
`📖 ${word}
🗣️ ${reading}
💡 ${meaning}`;

    } catch (error) {
        document.getElementById("result").innerText = "에러 발생 😢";
    }
}

function copyText() {
    let text = document.getElementById("result").innerText;
    navigator.clipboard.writeText(text);
    alert("복사됨!");
}
</script>


</body>
</html>
